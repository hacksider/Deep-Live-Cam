name: Secret Scan

on:
  # pull_request:
  #   types: [opened, synchronize, reopened]
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.24.3"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Run gitleaks (working tree only)
        run: |
          set -euo pipefail
          SCAN_DIR="$(mktemp -d)"
          rsync -a --exclude '.git/' --exclude 'devdocs/htmlpages/' ./ "${SCAN_DIR}/"
          set +e
          ./gitleaks detect \
            --no-git \
            --source "${SCAN_DIR}" \
            --redact \
            --verbose \
            --exit-code 2 \
            --report-format sarif \
            --report-path results.sarif
          EXIT_CODE=$?
          set -e
          echo "GITLEAKS_EXIT_CODE=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: Build Action Summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          report = "results.sarif"
          with open(summary_path, "a", encoding="utf-8") as s:
              s.write("## Secret Scan Summary\n\n")
              if not os.path.exists(report):
                  s.write("- No SARIF report found.\n")
                  raise SystemExit(0)
              with open(report, "r", encoding="utf-8") as f:
                  data = json.load(f)
              results = []
              for run in data.get("runs", []):
                  results.extend(run.get("results", []))
              count = len(results)
              if count == 0:
                  s.write("- ✅ No leaks detected.\n")
                  raise SystemExit(0)
              s.write(f"- ❌ Leaks detected: **{count}**\n\n")
              s.write("| Rule | File | Line |\n")
              s.write("|---|---|---|\n")
              for r in results[:50]:
                  rule = r.get("ruleId", "unknown")
                  loc = (r.get("locations") or [{}])[0]
                  p = (((loc.get("physicalLocation") or {}).get("artifactLocation") or {}).get("uri") or "unknown")
                  line = (((loc.get("physicalLocation") or {}).get("region") or {}).get("startLine") or "")
                  s.write(f"| {rule} | {p} | {line} |\n")
              if count > 50:
                  s.write(f"\n_Only first 50 findings shown ({count-50} more)._")
          PY

      - name: Fail job when leaks are found
        if: always()
        run: |
          set -euo pipefail
          if [ "${GITLEAKS_EXIT_CODE:-0}" = "2" ]; then
            echo "Gitleaks found leaks."
            exit 2
          fi
